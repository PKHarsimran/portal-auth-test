<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      color: #1e3a8a;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .badge {
      padding: 12px 18px;
      border-radius: 999px;

      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="badge">Embedded portal status: healthy</div>
</body>
</html>
