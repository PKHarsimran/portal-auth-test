<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login - Portal Auth Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container narrow">
    <div class="card">
      <h1>Login</h1>
      <p>Use the test credentials to access the protected portal.</p>

      {% if error %}
      <div class="alert">{{ error }}</div>
      {% endif %}

      <form method="post">
        <input type="hidden" name="redirect_url" value="{{ redirect_url }}">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="admin" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="password123" required>

        <label class="checkbox-row" for="remember_me">
          <input id="remember_me" name="remember_me" type="checkbox">
          <span>Remember me for 30 days</span>
        </label>

        <button type="submit">Sign in</button>
      </form>

      <div class="helper-links">
        <a href="/forgot-password">Forgot password?</a>
        <a href="/reset-password">Reset password</a>
      </div>
    </div>
  </main>
</body>
</html>
