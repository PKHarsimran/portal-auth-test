<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ title or "Portal Auth Test" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Authenticated portal test app for crawler validation">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="eyebrow">Authenticated Test Portal</div>
      <div class="brand">Portal Auth Test</div>
    </div>
    <nav class="topnav" aria-label="Primary">
      {% for section in portal_sections or [] %}
      <a
        href="{{ url_for(section.endpoint) }}"
        class="{% if active_section == section.endpoint %}is-active{% endif %}"
      >
        {{ section.label }}
      </a>
      {% endfor %}
      <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
